# =============================================================================
# gradle.properties — Global Gradle settings
# =============================================================================
# WHY: These settings affect HOW Gradle builds your project.
# Think of them as "preferences" for the build system.
# =============================================================================

# Use AndroidX libraries (the modern versions of Android support libraries)
android.useAndroidX=true

# Run Gradle in its own process for better performance
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enable parallel builds (faster!)
org.gradle.parallel=true

# Cache build outputs (even faster on subsequent builds!)
org.gradle.caching=true

# Non-transitive R classes (recommended for new projects)
android.nonTransitiveRClass=true
