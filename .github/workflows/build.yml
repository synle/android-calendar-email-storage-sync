name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-option1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Run option1 unit tests
        working-directory: option1
        run: gradle testDebugUnitTest --no-daemon

      - name: Build option1 debug APK
        working-directory: option1
        run: gradle assembleDebug --no-daemon

      - name: Upload option1 debug APK
        uses: actions/upload-artifact@v7
        with:
          name: unifiedhub-option1-debug-apk
          path: option1/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
